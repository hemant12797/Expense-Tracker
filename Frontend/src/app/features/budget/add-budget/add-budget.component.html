<div class="fade-in">
  <div class="flex-between mb-3">
    <div>
      <h2 class="page-title" style="margin: 0;">🎯 Add Budget</h2>
      <p class="page-subtitle">Set limits on your expenses</p>
    </div>
  </div>

  <div class="glass-panel" style="max-width: 600px;">
    <div *ngIf="successMsg" class="alert alert-success">✅ {{ successMsg }}</div>
    <div *ngIf="errorMsg" class="alert alert-error">⚠️ {{ errorMsg }}</div>

    <form [formGroup]="budgetForm" (ngSubmit)="onSubmit()">
      <!-- Budget Name -->
      <div class="form-group">
        <label class="form-label" for="budget-name">Budget Name</label>
        <input
          id="budget-name"
          type="text"
          formControlName="name"
          class="form-input"
          placeholder="e.g. Monthly Grocery Budget"
        >
        <div *ngIf="budgetForm.get('name')?.touched && budgetForm.get('name')?.invalid" class="form-error">
          ⚠ Budget Name is required
        </div>
      </div>

      <!-- Amount -->
      <div class="form-group">
        <label class="form-label" for="budget-limit">Limit Amount (₹)</label>
        <div style="position: relative;">
          <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-weight: 600; font-size: 1rem;">₹</span>
          <input
            id="budget-limit"
            type="number"
            formControlName="limitAmount"
            class="form-input"
            placeholder="0.00"
            min="0.01"
            step="0.01"
            style="padding-left: 2.5rem;"
          >
        </div>
        <div *ngIf="budgetForm.get('limitAmount')?.touched && budgetForm.get('limitAmount')?.invalid" class="form-error">
          ⚠ Please enter a valid amount greater than 0
        </div>
      </div>

      <!-- Category & Period Row -->
      <div class="grid-2" style="gap: 1rem;">
        <div class="form-group" style="margin: 0;">
          <label class="form-label" for="budget-category">Category (Optional)</label>
          <select id="budget-category" formControlName="categoryId" class="form-input" (change)="onCategoryChange($event)">
            <option value="">All Categories (General)</option>
            <option *ngFor="let cat of displayCategories" [value]="cat.id">{{ cat.name }}</option>
          </select>
        </div>

        <div class="form-group" style="margin: 0;">
          <label class="form-label" for="budget-period">Period</label>
          <select id="budget-period" formControlName="period" class="form-input">
            <option value="MONTHLY">📅 Monthly</option>
            <option value="WEEKLY">📆 Weekly</option>
            <option value="YEARLY">🗓️ Yearly</option>
          </select>
        </div>
      </div>

      <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
        <button id="add-budget-submit" type="submit" class="btn-primary" [disabled]="budgetForm.invalid || submitting" style="flex: 1; justify-content: center;">
          <span *ngIf="!submitting">💾 Save Budget</span>
          <span *ngIf="submitting" style="display: flex; align-items: center; gap: 0.5rem;">
            <span class="spinner" style="width: 16px; height: 16px; border-width: 2px;"></span> Saving...
          </span>
        </button>
        <button type="button" class="btn-secondary" (click)="resetForm()" style="padding: 0.75rem 1.25rem;">
          🔄 Reset
        </button>
      </div>
    </form>
  </div>
</div>
