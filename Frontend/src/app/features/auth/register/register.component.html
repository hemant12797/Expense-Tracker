<div class="auth-page">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="auth-card glass-panel fade-in">
    <div class="auth-header">
      <div class="auth-logo" style="background: linear-gradient(135deg, var(--accent), #059669);">
        <span class="logo-icon">🚀</span>
      </div>
      <h1 class="gradient-text" style="font-size: 1.9rem; font-weight: 800; margin-bottom: 0.25rem;">Create Account</h1>
      <p class="text-secondary" style="font-size: 0.95rem;">Start tracking your finances today — it's free!</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-error">⚠️ {{ errorMessage }}</div>
    <div *ngIf="successMessage" class="alert alert-success">✅ {{ successMessage }}</div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="reg-fullname">Full Name</label>
        <input
          id="reg-fullname"
          type="text"
          formControlName="fullName"
          class="form-input"
          placeholder="John Doe"
          autocomplete="name"
        >
        <div *ngIf="registerForm.get('fullName')?.touched && registerForm.get('fullName')?.invalid" class="form-error">
          ⚠ Full name is required
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-email">Email Address</label>
        <input
          id="reg-email"
          type="email"
          formControlName="email"
          class="form-input"
          placeholder="you@example.com"
          autocomplete="email"
        >
        <div *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid" class="form-error">
          ⚠ Please enter a valid email address
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <div style="position: relative;">
          <input
            id="reg-password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            class="form-input"
            placeholder="At least 6 characters"
            autocomplete="new-password"
            style="padding-right: 3rem;"
          >
          <button type="button" (click)="togglePassword()"
            style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 1rem;">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <div *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid" class="form-error">
          ⚠ Password must be at least 6 characters
        </div>

        <!-- Password strength bar -->
        <div style="margin-top: 0.5rem;" *ngIf="registerForm.get('password')?.value">
          <div class="progress-track">
            <div class="progress-fill" [style.width.%]="passwordStrength" [style.background]="strengthColor"></div>
          </div>
          <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;">
            Password strength: <span [style.color]="strengthColor">{{ strengthLabel }}</span>
          </p>
        </div>
      </div>

      <button
        id="register-submit-btn"
        type="submit"
        class="btn-primary w-full"
        style="justify-content: center; padding: 1rem; font-size: 1rem;"
        [disabled]="registerForm.invalid || isLoading"
        [style.background]="'linear-gradient(135deg, var(--accent), #059669)'"
        [style.boxShadow]="'0 4px 15px rgba(16, 185, 129, 0.35)'"
      >
        <span *ngIf="!isLoading">Create Free Account →</span>
        <span *ngIf="isLoading" style="display: flex; align-items: center; gap: 0.5rem;">
          <span class="spinner" style="width: 18px; height: 18px; border-width: 2px; border-top-color: white;"></span>
          Creating account...
        </span>
      </button>
    </form>

    <div class="divider"></div>

    <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
      Already have an account?
      <a id="go-to-login" href="javascript:void(0)" (click)="navigateToLogin()"
        style="color: var(--primary-light); font-weight: 600; text-decoration: none; margin-left: 0.25rem;">
        Sign in
      </a>
    </p>
  </div>
</div>
